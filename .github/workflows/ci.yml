name: CI - Node Express

on: 
  push: 
    branches: [ "main" ]
  pull_request: 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener codigo
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with: 
          node-version: 24.14.0

      - name: Instalar dependencias
        run: npm install

      - name: Ejectuar pruebas
        run: npm test
